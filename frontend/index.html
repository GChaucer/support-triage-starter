<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Triage Starter</title>
    <style>
      :root {
        --bg: #f5efe4;
        --panel: #fffaf2;
        --ink: #1f2a1f;
        --muted: #6a6f61;
        --accent: #0f766e;
        --border: #d8ccb9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 35%),
          linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        margin-bottom: 24px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.5rem);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 56rem;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(31, 42, 31, 0.06);
      }

      textarea,
      pre,
      button {
        font: inherit;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px;
        background: #fff;
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--accent);
        color: white;
        cursor: pointer;
      }

      .label {
        display: inline-block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #fbf7f0;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-height: 180px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Support Triage Starter</h1>
        <p>
          A narrow Phase 1 reference flow for issue classification, one-step missing-info gathering,
          mock tool calls, escalation, logging, and structured session output.
        </p>
      </section>

      <section class="grid">
        <div class="card">
          <span class="label">Customer Message</span>
          <textarea id="message" placeholder="Example: I was charged twice on alice@example.com"></textarea>
          <button id="submit">Run Triage</button>
        </div>

        <div class="card">
          <span class="label">Customer-Facing Output</span>
          <pre id="customerResponse">Waiting for input.</pre>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
          <span class="label">Structured Output</span>
          <pre id="jsonOutput">No session yet.</pre>
        </div>
      </section>
    </main>

    <script>
      const messageEl = document.getElementById("message");
      const customerResponseEl = document.getElementById("customerResponse");
      const jsonOutputEl = document.getElementById("jsonOutput");
      const submitEl = document.getElementById("submit");

      let followUpState = null;
      let sessionId = null;

      submitEl.addEventListener("click", async () => {
        const message = messageEl.value.trim();
        if (!message) return;

        const payload = { message, session_id: sessionId, follow_up_state: followUpState };
        const response = await fetch("/triage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (data.needs_follow_up) {
          followUpState = data.follow_up_state;
          sessionId = data.follow_up_state.session_id;
          customerResponseEl.textContent = data.follow_up_question;
          jsonOutputEl.textContent = JSON.stringify(data, null, 2);
          messageEl.value = "";
          return;
        }

        followUpState = null;
        sessionId = data.session_output.session_id;
        customerResponseEl.textContent = data.session_output.customer_response;
        jsonOutputEl.textContent = JSON.stringify(data.session_output, null, 2);
        messageEl.value = "";
      });
    </script>
  </body>
</html>
